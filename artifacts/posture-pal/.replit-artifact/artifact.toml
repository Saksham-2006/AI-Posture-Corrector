kind = "web"
previewPath = "/"
title = "Posture Pal"
version = "1.0.0"
id = "artifacts/posture-pal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20005

[services.development]
run = "pnpm --filter @workspace/posture-pal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/posture-pal", "run", "build" ]
publicDir = "artifacts/posture-pal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20005"
BASE_PATH = "/"
